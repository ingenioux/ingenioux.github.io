<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hire Me | Under Construction</title>

<style>

*{
box-sizing:border-box;
}

body{
font-family:Arial, sans-serif;
background:#f3f5f8;
margin:0;
padding:20px;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

/* CARD */

.container{
background:white;
width:100%;
max-width:420px;
padding:30px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

/* HEADER */

h1{
text-align:center;
margin-bottom:5px;
}

.status{
text-align:center;
color:#ff9800;
font-weight:bold;
margin-bottom:20px;
}

/* FORM */

label{
font-weight:600;
}

input, textarea{
width:100%;
padding:10px;
margin-top:6px;
margin-bottom:15px;
border-radius:6px;
border:1px solid #ccc;
font-size:14px;
}

textarea{
resize:none;
}

/* BUTTON */

button{
width:100%;
padding:12px;
border:none;
background:#007bff;
color:white;
border-radius:6px;
font-size:16px;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:#0056b3;
}

.message{
margin-top:15px;
text-align:center;
color:green;
font-weight:500;
}

/* MOBILE IMPROVEMENT */

@media(max-width:480px){

.container{
padding:22px;
}

h1{
font-size:24px;
}

}

</style>
</head>

<body>

<div class="container">

<h1>Hire Me</h1>
<div class="status">Website Under Construction</div>

<form id="hireForm">

<label>Name</label>
<input type="text" id="name" required>

<label>Email</label>
<input type="email" id="email" required>

<label>Project Type</label>
<input type="text" id="project">

<label>Project Details</label>
<textarea id="details" rows="4"></textarea>

<button type="submit">Submit Request</button>

</form>

<div class="message" id="msg"></div>

</div>

<script>

document.getElementById("hireForm").addEventListener("submit",function(e){

e.preventDefault();

let name=document.getElementById("name").value;

document.getElementById("msg").innerHTML=
"Thank you "+name+"! Due to maintenance, we are currently unable to save your request. Please contact me at info.ingenioux@gmail.com";

this.reset();

});

</script>

</body>
</html>
